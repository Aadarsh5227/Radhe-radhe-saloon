<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Book Seat</title>
<style>
body{font-family: Arial; text-align:center; margin-top:100px;}
input{padding:10px; font-size:16px;}
button{padding:10px 20px; font-size:16px; margin-top:10px; cursor:pointer;}
#message{margin-top:20px; font-size:18px; color:green;}
</style>
</head>
<body>

<h2>Enter Your Name</h2>
<input type="text" id="name" placeholder="Your Name">
<br>
<button onclick="bookSeat()">Book Seat</button>
<p id="message"></p>

<script>
function bookSeat(){
  let name = document.getElementById("name").value;
  if(name==""){
    alert("Please enter your name");
    return;
  }

  let now = new Date();
  let hours = now.getHours();
  let minutes = now.getMinutes();
  let ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;
  minutes = minutes < 10 ? '0'+minutes : minutes;
  let timeStr = hours + ':' + minutes + ' ' + ampm;

  let booking = name + " at " + timeStr;
  let log = localStorage.getItem("bookings");
  if(log){
    log += "\n" + booking;
  } else {
    log = booking;
  }
  localStorage.setItem("bookings", log);

  document.getElementById("message").innerText =
    "Seat booked successfully by " + booking;
}
</script>

</body>
</html>
